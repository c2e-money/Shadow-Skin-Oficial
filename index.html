    const DURATION = 120000; // 2 Minutes

    // 1. SessionStorage se har Tab ko ek unique ID do
    let tabUniqueId = sessionStorage.getItem("tab_unique_id");
    if (!tabUniqueId) {
        tabUniqueId = "T_" + Math.random().toString(36).substr(2, 9);
        sessionStorage.setItem("tab_unique_id", tabUniqueId);
    }

    // 2. Us ID ke liye LocalStorage mein Start Time check karo
    let startTime = localStorage.getItem("start_time_" + tabUniqueId);
    if (!startTime) {
        startTime = Date.now().toString();
        localStorage.setItem("start_time_" + tabUniqueId, startTime);
    }

    function blockPage() {
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('accessPopup').style.display = 'flex';
    }

    window.onload = function() {
        const elapsed = Date.now() - parseInt(startTime);
        
        if (elapsed >= DURATION) {
            blockPage();
        } else {
            const seed = new Date().getFullYear()*10000 + (new Date().getMonth()+1)*100 + new Date().getDate();
            document.getElementById("passwordText").innerHTML = keysArray[seed % keysArray.length];
            
            const interval = setInterval(() => {
                const now = Date.now();
                const remaining = (parseInt(startTime) + DURATION) - now;
                
                if (remaining <= 0) {
                    clearInterval(interval);
                    blockPage();
                } else {
                    const m = Math.floor(remaining / 60000);
                    const s = Math.floor((remaining % 60000) / 1000);
                    document.getElementById("timer").innerHTML = "00:" + String(m).padStart(2,"0") + ":" + String(s).padStart(2,"0");
                }
            }, 1000);
        }
    };

    function copyKey(){ 
        const key = document.getElementById("passwordText").innerText;
        navigator.clipboard.writeText(key); 
        const t = document.getElementById("toast"); 
        t.style.display="block"; 
        setTimeout(function(){ t.style.display="none"; },2000); 
    }
