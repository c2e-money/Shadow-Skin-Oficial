<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW SKIN TOOL</title>
    <script src="https://rightyrely.com/d7/e7/65/d7e765e7ffa0f90f007bde277a5a7b62.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Segoe UI,sans-serif; }
        body { background:#0f0f12; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; padding:20px; color:white; }
        #accessPopup { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; justify-content:center; align-items:center; flex-direction:column; padding:20px; text-align:center; }
        .card { width:100%; max-width:380px; background:#181020; border:2px solid #B52FF1; border-radius:20px; padding:30px; text-align:center; box-shadow:0 0 25px rgba(181,47,241,.35); }
        .logo { font-size:30px; margin-bottom:15px; }
        .title { font-size:18px; font-weight:bold; letter-spacing:2px; }
        .keyBox { margin-top:30px; background:#111; border:2px dashed #00ffcc; border-radius:15px; padding:16px; font-size:28px; font-weight:bold; color:#00ffcc; letter-spacing:3px; }
        .copyBtn { margin-top:18px; width:100%; padding:14px; border:none; border-radius:12px; background:#B52FF1; color:white; font-size:16px; font-weight:bold; cursor:pointer; }
        .timerBox { margin-top:25px; padding:15px; border-radius:12px; background:#121212; border:1px solid #B52FF1; }
        .timer { margin-top:8px; font-size:24px; font-weight:bold; color:#ff4d88; }
    </style>
</head>
<body>

<div id="accessPopup">
    <h2 style="color:#B52FF1;">⚠️ Access Expired</h2>
    <p>Is tab ka 2 minute ka access khatam ho gaya hai.</p>
</div>

<div class="card" id="mainContent">
    <div class="title">SHADOW SKIN TOOL</div>
    <div class="keyBox" id="passwordText">LOADING...</div>
    <button class="copyBtn" onclick="copyKey()">COPY KEY</button>
    <div class="timerBox">
        <div class="timer" id="timer">00:00</div>
    </div>
</div>

<script>
    // 2 Minutes = 120,000ms
    const DURATION = 120000;

    // Har naye tab ke liye ek Random ID
    let myTabId = localStorage.getItem("tab_id_" + window.location.href);
    if (!myTabId) {
        myTabId = "ID_" + Date.now();
        localStorage.setItem("tab_id_" + window.location.href, myTabId);
    }

    // Start time check karo
    let startTime = localStorage.getItem("start_" + myTabId);
    if (!startTime) {
        startTime = Date.now();
        localStorage.setItem("start_" + myTabId, startTime);
    }

    // Check Logic (Page load hote hi)
    function checkAndBlock() {
        const now = Date.now();
        const elapsed = now - parseInt(startTime);

        if (elapsed >= DURATION) {
            document.getElementById('mainContent').style.display = 'none';
            document.getElementById('accessPopup').style.display = 'flex';
            return true;
        }
        return false;
    }

    if (!checkAndBlock()) {
        document.getElementById("passwordText").innerText = "SKIN_KEY_99";
        
        setInterval(() => {
            if(checkAndBlock()) return;
            
            const remaining = DURATION - (Date.now() - parseInt(startTime));
            const m = Math.floor(remaining / 60000);
            const s = Math.floor((remaining % 60000) / 1000);
            document.getElementById("timer").innerText = "00:" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
        }, 1000);
    }

    function copyKey(){ navigator.clipboard.writeText("SKIN_KEY_99"); alert("Copied!"); }
</script>
</body>
</html>
