<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHADOW SKIN TOOL</title>
    <!-- Ads -->
    <script src="https://rightyrely.com/d7/e7/65/d7e765e7ffa0f90f007bde277a5a7b62.js"></script>
    <style>
        body { background:#0f0f12; color:white; display:flex; justify-content:center; align-items:center; min-height:100vh; font-family:sans-serif; }
        #accessPopup { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; flex-direction:column; justify-content:center; align-items:center; }
        .card { background:#181020; border:2px solid #B52FF1; padding:30px; border-radius:20px; text-align:center; width:90%; max-width:350px; }
        .keyBox { background:#111; padding:15px; font-size:24px; border:2px dashed #00ffcc; color:#00ffcc; margin:20px 0; }
        .timer { font-size:20px; color:#ff4d88; font-weight:bold; }
    </style>
</head>
<body>

<div id="accessPopup"><h2>⚠️ Tab Blocked</h2><p>Access khatam ho gaya hai.</p></div>

<div class="card" id="mainContent">
    <h3>SHADOW SKIN TOOL</h3>
    <div class="keyBox" id="passwordText">LOADING...</div>
    <div class="timer" id="timer">00:00:00</div>
</div>

<script>
    // Cookie Set/Get Functions
    function setCookie(cname, cvalue, exdays) {
        const d = new Date();
        d.setTime(d.getTime() + (exdays*24*60*60*1000));
        document.cookie = cname + "=" + cvalue + ";" + d.toUTCString() + ";path=/";
    }

    function getCookie(cname) {
        let name = cname + "=";
        let ca = document.cookie.split(';');
        for(let i = 0; i < ca.length; i++) {
            let c = ca[i].trim();
            if (c.indexOf(name) == 0) return c.substring(name.length, c.length);
        }
        return "";
    }

    // Har Tab ke liye Unique ID (Browser reopen par bhi retain rahegi)
    let tabId = getCookie("user_tab_id");
    if (!tabId) {
        tabId = "T_" + Math.floor(Math.random()*1000000);
        setCookie("user_tab_id", tabId, 365);
    }

    // Start Time (Cookie se lo)
    let startTime = getCookie("start_" + tabId);
    if (!startTime) {
        startTime = Date.now().toString();
        setCookie("start_" + tabId, startTime, 365);
    }

    const DURATION = 120000; // 2 Minutes

    function block() {
        document.getElementById('mainContent').style.display = 'none';
        document.getElementById('accessPopup').style.display = 'flex';
    }

    window.onload = function() {
        const elapsed = Date.now() - parseInt(startTime);
        if (elapsed >= DURATION) {
            block();
        } else {
            // UI Update
            const keys = ["X7Q9LM","P4ZT82","NV8KQ1","R5MX7A","J2WP9L","KD84QT"]; // Add all here
            document.getElementById("passwordText").innerText = keys[0];
            
            setInterval(() => {
                const now = Date.now();
                const remaining = (parseInt(startTime) + DURATION) - now;
                if (remaining <= 0) {
                    block();
                } else {
                    const m = Math.floor(remaining / 60000);
                    const s = Math.floor((remaining % 60000) / 1000);
                    document.getElementById("timer").innerText = "00:" + String(m).padStart(2,'0') + ":" + String(s).padStart(2,'0');
                }
            }, 1000);
        }
    };
</script>
</body>
</html>
